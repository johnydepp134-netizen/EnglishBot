name: Daily English Topic

on:
  schedule:
    - cron: '0 7 * * *'  # Каждый день в 10:00 по Москве (07:00 UTC)
  workflow_dispatch:       # Кнопка ручного запуска на GitHub

jobs:
  post-topic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq requests

      - name: Post daily topic
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TOPIC_ID: ${{ secrets.TOPIC_ID }}
        run: python bot.py

      - name: Save updated topics list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_topics.json
          git diff --staged --quiet || git commit -m "chore: update used topics [skip ci]"
          git pull --rebase origin main
          git push
